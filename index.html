*{box-sizing:border-box;margin:0;padding:0}
:root{--y:#FFE41F;--g:#11C296;--gd:#0a9a7a;--k:#0B0B0B;--mg:#F0305C}
body{font-family:'KF',-apple-system,sans-serif;background:#f5f5f5;min-height:100vh}
.gate{position:fixed;inset:0;background:var(--k);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px}
.gate-box{background:var(--y);border-radius:20px;padding:32px 24px;width:100%;max-width:340px;text-align:center}
.gate-logo{height:36px;width:auto;margin:0 auto 16px;display:block}
.gate-title{font-family:'KF',sans-serif;font-weight:900;font-size:18px;color:var(--k);margin-bottom:18px}
.gate-box input{width:100%;padding:16px;border-radius:12px;border:2px solid rgba(11,11,11,.15);font-family:'KF',sans-serif;font-size:18px;font-weight:900;text-align:center;letter-spacing:4px;background:#fff;color:var(--k);margin-bottom:12px}
.gate-box input:focus{outline:none;border-color:var(--g)}
.gate-err{font-size:12px;color:var(--mg);font-weight:700;margin-bottom:10px;min-height:16px}
.gate-btn{width:100%;padding:16px;background:var(--k);color:var(--y);border:none;border-radius:12px;font-family:'KF',sans-serif;font-size:16px;font-weight:900;cursor:pointer}
.main{display:none}.main.show{display:block}
.hdr{background:var(--k);padding:16px 20px;display:flex;align-items:center;gap:14px}
.logo{height:32px;width:auto}
.hdr-title{font-family:'KF',sans-serif;font-weight:900;font-size:14px;color:var(--y)}
.hdr-sub{font-size:10px;color:var(--g);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.inv-board{background:var(--y);padding:14px 16px;border-bottom:3px solid var(--g)}
.inv-board-title{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(11,11,11,.5);text-transform:uppercase;margin-bottom:8px;text-align:center}
.inv-grid{display:grid;grid-template-columns:1fr;gap:6px}
.inv-item{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:8px;padding:8px 12px}
.inv-item-name{font-size:12px;font-weight:700;color:var(--k)}
.inv-item-num{font-family:'KF',sans-serif;font-weight:900;font-size:18px;color:var(--gd)}
.inv-item-num.zero{color:var(--mg)}
.body{padding:20px 16px 40px}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-title{font-family:'KF',sans-serif;font-weight:900;font-size:13px;color:var(--k);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;opacity:.5}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--k);opacity:.5;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.field input{width:100%;padding:14px 16px;border-radius:10px;border:2px solid #eee;font-family:'KF',sans-serif;font-size:16px;font-weight:700;color:var(--k);background:#fafafa}
.field input:focus{outline:none;border-color:var(--g)}
.field select{width:100%;padding:14px 16px;border-radius:10px;border:2px solid #eee;font-family:'KF',sans-serif;font-size:15px;font-weight:700;color:var(--k);background:#fafafa;appearance:none;-webkit-appearance:none}
.field select:focus{outline:none;border-color:var(--g)}
.sold-out-box{background:#fef0f0;border:2px solid var(--mg);border-radius:12px;padding:16px;text-align:center;margin-bottom:14px;display:none}
.sold-out-box.show{display:block}
.sold-out-box .title{font-family:'KF',sans-serif;font-weight:900;font-size:15px;color:var(--mg)}
.sold-out-box .sub{font-size:12px;color:var(--mg);opacity:.8;margin-top:4px;font-weight:600}
.cond-box{display:none;margin-bottom:14px}.cond-box.show{display:block}
.cond-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.cond-item:last-child{border-bottom:none}
.cond-item input[type=checkbox]{width:22px;height:22px;flex-shrink:0;margin-top:1px;accent-color:var(--g)}
.cond-item label{font-size:13px;font-weight:600;color:var(--k);line-height:1.5;cursor:pointer}
.submit-btn{width:100%;padding:18px;background:var(--k);color:var(--y);border:none;border-radius:14px;font-family:'KF',sans-serif;font-size:18px;font-weight:900;cursor:pointer;transition:transform .1s}
.submit-btn:active{transform:scale(.97)}
.submit-btn:disabled{background:#ccc;color:#999;cursor:not-allowed}
.result{border-radius:14px;padding:18px;text-align:center;font-family:'KF',sans-serif;font-weight:900;font-size:16px;margin-top:16px;display:none}
.result.ok{background:#e8faf4;color:var(--gd);border:2px solid var(--g);display:block}
.result.err{background:#fef0f0;color:var(--mg);border:2px solid var(--mg);display:block}
</style>
</head>

    <div><div class="hdr-title">Staff Portal</div><div class="hdr-sub">Reward Redemption</div></div>
  </div>

  <div class="inv-board">
    <div class="inv-board-title">Today's Available Stock</div>
    <div class="inv-grid" id="inv-grid"><div style="text-align:center;color:#888;font-size:12px;padding:8px">Loading...</div></div>
  </div>

  <div class="body">
    <div class="card">
      <div class="card-title">Redeem Reward</div>
      <div class="field"><label>Customer Phone Number</label>
        <input type="tel" id="phone" placeholder="+966 5XX XXX XXXX">
      </div>
      <div class="field"><label>Giveaway Chosen</label>
        <select id="reward" onchange="onRewardChange()">
<option value="">-- Choose a reward --</option>
          <option value="cheer_stick">Keeta Cheer Stick</option>
          <option value="baloot_cards">Keeta Baloot Cards</option>
          <option value="keychain_mini">Kiki Keychain Mini</option>
          <option value="keychain_small">Kiki Keychain Small</option>
          <option value="limited_toy">Limited Kiki Toy - Regular (11 cards)</option>
          <option value="limited_toy_matchday">Limited Kiki Toy - Saudi Match Day (6 cards)</option>
          <option value="limited_toy_social">Limited Kiki Toy - Social Media Reward</option>
        </select>
      </div>
      <div class="sold-out-box" id="sold-out-box">
        <div class="title">Sold out for today</div>
        <div class="sub">Please tell the user to come back tomorrow or choose another reward.</div>
      </div>
      <div class="cond-box" id="cond-box">
        <div class="card-title" style="margin-bottom:10px">Verify Conditions</div>
        <div id="cond-list"></div>
      </div>
      <div class="field"><label>Staff Member</label>
        <select id="staff">
          <option value="">-- Select staff --</option>
          <option value="staff_1">Keeta Staff 1</option>
          <option value="staff_2">Keeta Staff 2</option>
          <option value="staff_3">Keeta Staff 3</option>
          <option value="staff_4">Keeta Staff 4</option>
        </select>
      </div>
      <button class="submit-btn" id="submit-btn" onclick="redeem()" disabled>Submit</button>
      <div class="result" id="result"></div>
    </div>
  </div>
</div>

<script>

var SCRIPT_URL='https://script.google.com/macros/s/AKfycbwo5WRsVxCX8DUftBAiBAg6uchxy-gchHXqTTUak8AtYQEIoI3gKr89XhF_VrdZYNkF/exec';
var CONDITIONS={"cheer_stick": ["User scanned the QR code (not opened via Keeta App directly)", "User Draw chances shows 0 - confirming they took the draw"], "baloot_cards": ["User scanned the QR code", "User has >= 1 card collected (if 0, guide them to Draw first)", "User won the Flip Game"], "keychain_mini": ["User scanned the QR code", "User has >= 3 cards collected", "User won the Flip Game"], "keychain_small": ["User scanned the QR code", "User has >= 5 cards collected", "User won the Flip Game"], "limited_toy": ["User scanned the QR code", "User has exactly 11 cards collected", "User posted on social media and tagged @Keeta (Instagram @ksa.keeta / TikTok @ksa.keeta / X @keetaglobal_ksa / Snapchat @keeta_ksa)"], "limited_toy_matchday": ["Today is a Saudi Match Day (lower threshold applies)", "User scanned the QR code", "User has >= 6 cards collected", "User posted on social media and tagged @Keeta (any of the 4 channels)"], "limited_toy_social": ["User scanned the QR code and clicked Draw", "User posted a video/photo of Keeta Tifo event", "Post reached >= 500 likes OR >= 100 shares", "Staff verified the post is from this visitor's own account", "Content is not negative or inappropriate"]};
var REWARDS_LIST=["cheer_stick", "baloot_cards", "keychain_mini", "keychain_small", "limited_toy", "limited_toy_matchday", "limited_toy_social"];
var INVENTORY={};

function checkPassword(){
  var pw=document.getElementById('pw-input').value.trim();
  var err=document.getElementById('gate-err');
  if(!pw){err.textContent='Please enter passcode';return;}
  err.textContent='Checking...';
  fetch(SCRIPT_URL+'?action=check_password&password='+encodeURIComponent(pw))
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.success&&data.valid){
        localStorage.setItem('staffAuth','1');
        document.getElementById('gate').style.display='none';
        document.getElementById('main').classList.add('show');
        loadInventory();
      }else{err.textContent='Incorrect passcode';}
    }).catch(function(){err.textContent='Connection error, try again';});
}

function loadInventory(){
  fetch(SCRIPT_URL+'?action=get_inventory')
    .then(function(r){return r.json();})
    .then(function(data){if(data.success){INVENTORY=data.inventory;renderInvBoard();}})
    .catch(function(){});
}

function renderInvBoard(){
  var grid=document.getElementById('inv-grid');grid.innerHTML='';
  REWARDS_LIST.forEach(function(rid){
    var inv=INVENTORY[rid];if(!inv)return;
    var d=document.createElement('div');d.className='inv-item';
    d.innerHTML='<span class="inv-item-name">'+inv.displayName+'</span><span class="inv-item-num'+(inv.available<=0?' zero':'')+'">'+inv.available+'</span>';
    grid.appendChild(d);
  });
}

function onRewardChange(){
  var rid=document.getElementById('reward').value;
  var soldBox=document.getElementById('sold-out-box');
  var condBox=document.getElementById('cond-box');
  var condList=document.getElementById('cond-list');
  var btn=document.getElementById('submit-btn');
  if(!rid){soldBox.classList.remove('show');condBox.classList.remove('show');btn.disabled=true;return;}
  var inv=INVENTORY[rid];
  if(inv&&inv.available<=0){soldBox.classList.add('show');condBox.classList.remove('show');btn.disabled=true;return;}
  soldBox.classList.remove('show');
  condList.innerHTML='';
  var conds=CONDITIONS[rid]||[];
  conds.forEach(function(c,idx){
    var d=document.createElement('div');d.className='cond-item';
    d.innerHTML='<input type="checkbox" id="c'+idx+'" onchange="checkAll()"><label for="c'+idx+'">'+c+'</label>';
    condList.appendChild(d);
  });
  condBox.classList.add('show');checkAll();
}

function checkAll(){
  var rid=document.getElementById('reward').value;
  var conds=CONDITIONS[rid]||[];var ok=true;
  for(var i=0;i<conds.length;i++){var cb=document.getElementById('c'+i);if(!cb||!cb.checked){ok=false;break;}}
  document.getElementById('submit-btn').disabled=!ok;
}

function redeem(){
  var phone=document.getElementById('phone').value.trim();
  var rid=document.getElementById('reward').value;
  var staff=document.getElementById('staff').value;
  var result=document.getElementById('result');
  var btn=document.getElementById('submit-btn');
  result.className='result';result.style.display='none';
  if(!phone||phone.length<6){result.className='result err';result.textContent='Please enter a valid phone number';result.style.display='block';return;}
  if(!rid){result.className='result err';result.textContent='Please select a reward';result.style.display='block';return;}
  if(!staff){result.className='result err';result.textContent='Please select staff member';result.style.display='block';return;}
  btn.disabled=true;btn.textContent='Checking...';
  var url=SCRIPT_URL+'?action=redeem&phone='+encodeURIComponent(phone)+'&reward='+encodeURIComponent(rid)+'&staff='+encodeURIComponent(staff);
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.success){
        result.className='result ok';
        result.textContent='Congrats! '+(data.reward||'Reward')+' is yours!';
        loadInventory();setTimeout(function(){onRewardChange();},800);
        document.getElementById('phone').value='';document.getElementById('reward').value='';
        document.getElementById('staff').value='';document.getElementById('cond-box').classList.remove('show');
      }else if(data.error==='already_redeemed'){
        result.className='result err';result.textContent='Sorry, this customer already redeemed this reward. Please try another.';
      }else if(data.error==='out_of_stock'){
        result.className='result err';result.textContent='Sold out for today.';
        loadInventory();setTimeout(function(){onRewardChange();},800);
      }else{
        result.className='result err';result.textContent='Error: '+(data.error||'unknown');
      }
      result.style.display='block';btn.disabled=false;btn.textContent='Submit';checkAll();
    }).catch(function(){
      result.className='result err';result.textContent='Connection error. Please try again.';
      result.style.display='block';btn.disabled=false;btn.textContent='Submit';checkAll();
    });
}

if(localStorage.getItem('staffAuth')==='1'){
  document.getElementById('gate').style.display='none';
  document.getElementById('main').classList.add('show');
  loadInventory();
}

</script>
</body>
</html>
