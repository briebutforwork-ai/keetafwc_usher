*{box-sizing:border-box;margin:0;padding:0}
:root{--y:#FFE41F;--g:#11C296;--gd:#0a9a7a;--k:#0B0B0B;--mg:#F0305C}
body{font-family:'KF',-apple-system,sans-serif;background:#f5f5f5;min-height:100vh}

.gate{position:fixed;inset:0;background:var(--k);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px}
.gate-box{background:var(--y);border-radius:20px;padding:32px 24px;width:100%;max-width:340px;text-align:center}
.gate-logo{height:36px;width:auto;margin:0 auto 16px;display:block}
.gate-title{font-family:'KF',sans-serif;font-weight:900;font-size:18px;color:var(--k);margin-bottom:18px}
.gate-box input{width:100%;padding:16px;border-radius:12px;border:2px solid rgba(11,11,11,.15);font-family:'KF',sans-serif;font-size:18px;font-weight:900;text-align:center;letter-spacing:4px;background:#fff;color:var(--k);margin-bottom:12px}
.gate-box input:focus{outline:none;border-color:var(--g)}
.gate-err{font-size:12px;color:var(--mg);font-weight:700;margin-bottom:10px;min-height:16px}
.gate-btn{width:100%;padding:16px;background:var(--k);color:var(--y);border:none;border-radius:12px;font-family:'KF',sans-serif;font-size:16px;font-weight:900;cursor:pointer}

.main{display:none}
.main.show{display:block}
.hdr{background:var(--k);padding:16px 20px;display:flex;align-items:center;gap:14px}
.logo{height:32px;width:auto}
.hdr-title{font-family:'KF',sans-serif;font-weight:900;font-size:14px;color:var(--y);letter-spacing:.5px}
.hdr-sub{font-size:10px;color:var(--g);font-weight:700;letter-spacing:1px;text-transform:uppercase}

/* live inventory board */
.inv-board{background:var(--y);padding:14px 16px;border-bottom:3px solid var(--g)}
.inv-board-title{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(11,11,11,.5);text-transform:uppercase;margin-bottom:8px;text-align:center}
.inv-grid{display:grid;grid-template-columns:1fr;gap:6px}
.inv-item{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:8px;padding:8px 12px}
.inv-item-name{font-size:12px;font-weight:700;color:var(--k)}
.inv-item-num{font-family:'KF',sans-serif;font-weight:900;font-size:18px;color:var(--gd)}
.inv-item-num.zero{color:var(--mg)}

.body{padding:20px 16px 40px}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-title{font-family:'KF',sans-serif;font-weight:900;font-size:13px;color:var(--k);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;opacity:.5}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--k);opacity:.5;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.field input{width:100%;padding:14px 16px;border-radius:10px;border:2px solid #eee;font-family:'KF',sans-serif;font-size:16px;font-weight:700;color:var(--k);background:#fafafa}
.field input:focus{outline:none;border-color:var(--g)}
.field select{width:100%;padding:14px 16px;border-radius:10px;border:2px solid #eee;font-family:'KF',sans-serif;font-size:15px;font-weight:700;color:var(--k);background:#fafafa;appearance:none;-webkit-appearance:none}
.field select:focus{outline:none;border-color:var(--g)}

.sold-out-box{background:#fef0f0;border:2px solid var(--mg);border-radius:12px;padding:16px;text-align:center;margin-bottom:14px;display:none}
.sold-out-box.show{display:block}
.sold-out-box .title{font-family:'KF',sans-serif;font-weight:900;font-size:15px;color:var(--mg)}
.sold-out-box .sub{font-size:12px;color:var(--mg);opacity:.8;margin-top:4px;font-weight:600}

.cond-box{display:none;margin-bottom:14px}
.cond-box.show{display:block}
.cond-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.cond-item:last-child{border-bottom:none}
.cond-item input[type=checkbox]{width:22px;height:22px;flex-shrink:0;margin-top:1px;accent-color:var(--g)}
.cond-item label{font-size:13px;font-weight:600;color:var(--k);line-height:1.5;cursor:pointer}

.submit-btn{width:100%;padding:18px;background:var(--k);color:var(--y);border:none;border-radius:14px;font-family:'KF',sans-serif;font-size:18px;font-weight:900;cursor:pointer;transition:transform .1s}
.submit-btn:active{transform:scale(.97)}
.submit-btn:disabled{background:#ccc;color:#999;cursor:not-allowed}
.result{border-radius:14px;padding:18px;text-align:center;font-family:'KF',sans-serif;font-weight:900;font-size:16px;margin-top:16px;display:none}
.result.ok{background:#e8faf4;color:var(--gd);border:2px solid var(--g);display:block}
.result.err{background:#fef0f0;color:var(--mg);border:2px solid var(--mg);display:block}
</style>
</head>

<script>
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbwo5WRsVxCX8DUftBAiBAg6uchxy-gchHXqTTUak8AtYQEIoI3gKr89XhF_VrdZYNkF/exec';

var CONDITIONS = {
  "🎉 Keeta Cheer Stick": [
    "User scanned the QR code (not opened via Keeta App directly)",
    "User's \"Draw\" chances shows 0 — confirming they took the draw",
  ],
  "🃏 Keeta Baloot Cards": [
    "User scanned the QR code",
    "User has \u2265 1 card collected (if 0, guide them to Draw first)",
    "User won the Flip Game",
  ],
  "🔑 Kiki Keychain Mini": [
    "User scanned the QR code",
    "User has \u2265 3 cards collected (guide to collect more if needed)",
    "User won the Flip Game",
  ],
  "⭐ Kiki Keychain Small": [
    "User scanned the QR code",
    "User has \u2265 5 cards collected (guide to collect more if needed)",
    "User won the Flip Game",
  ],
  "🧸Limited Kiki Toy": [
    "User scanned the QR code",
    "User has exactly 11 cards collected",
    "User posted on social media and tagged @Keeta (Instagram @ksa.keeta / TikTok @ksa.keeta / X @keetaglobal_ksa / Snapchat @keeta_ksa)",
  ],
  "🧸Limited Kiki Toy-Saudi Match Day": [
    "Today is a Saudi Match Day (lower threshold applies)",
    "User scanned the QR code",
    "User has \u2265 6 cards collected",
    "User posted on social media and tagged @Keeta (any of the 4 channels)",
  ],
  "🧸Limited Kiki Toy-Social Influencer": [
    "User scanned the QR code and clicked Draw",
    "User posted a video/photo of Keeta's Tifo event",
    "Post reached \u2265 500 likes OR \u2265 100 shares",
    "Staff verified the post is from this visitor's own account",
    "Content is not negative/inappropriate",
  ],
};

var REWARDS_LIST = ["🎉 Keeta Cheer Stick", "🃏 Keeta Baloot Cards", "🔑 Kiki Keychain Mini", "⭐ Kiki Keychain Small", "🧸Limited Kiki Toy", "🧸Limited Kiki Toy-Saudi Match Day", "🧸Limited Kiki Toy-Social Influencer"];

var INVENTORY={};

function normalizePhone(p){return p.replace(/[\s\-\(\)]/g,'');}

async function checkPassword(){
  var pw=document.getElementById('pw-input').value.trim();
  var err=document.getElementById('gate-err');
  if(!pw){err.textContent='Please enter passcode';return;}
  err.textContent='Checking...';
  try{
    var url=SCRIPT_URL+'?action=check_password&password='+encodeURIComponent(pw);
    var res=await fetch(url);
    var data=await res.json();
    if(data.success && data.valid){
      localStorage.setItem('staffAuth','1');
      document.getElementById('gate').style.display='none';
      document.getElementById('main').classList.add('show');
      loadInventory();
    }else{
      err.textContent='Incorrect passcode';
    }
  }catch(e){
    err.textContent='Connection error, try again';
  }
}

async function loadInventory(){
  try{
    var url=SCRIPT_URL+'?action=get_inventory';
    var res=await fetch(url);
    var data=await res.json();
    if(data.success){
      INVENTORY=data.inventory;
      renderInvBoard();
    }
  }catch(e){console.log('inventory load failed',e);}
}

function renderInvBoard(){
  var grid=document.getElementById('inv-grid');
  grid.innerHTML='';
  REWARDS_LIST.forEach(function(r){
    var inv=INVENTORY[r];
    if(!inv)return;
    var div=document.createElement('div');
    div.className='inv-item';
    div.innerHTML='<span class="inv-item-name">'+r+'</span><span class="inv-item-num'+(inv.available<=0?' zero':'')+'">'+inv.available+'</span>';
    grid.appendChild(div);
  });
}

function onRewardChange(){
  var reward=document.getElementById('reward').value;
  var soldOutBox=document.getElementById('sold-out-box');
  var condBox=document.getElementById('cond-box');
  var condList=document.getElementById('cond-list');
  var submitBtn=document.getElementById('submit-btn');

  if(!reward){
    soldOutBox.classList.remove('show');
    condBox.classList.remove('show');
    submitBtn.disabled=true;
    return;
  }

  var inv=INVENTORY[reward];
  if(inv && inv.available<=0){
    soldOutBox.classList.add('show');
    condBox.classList.remove('show');
    submitBtn.disabled=true;
    return;
  }
  soldOutBox.classList.remove('show');

  condList.innerHTML='';
  var conds=CONDITIONS[reward]||[];
  conds.forEach(function(c,idx){
    var div=document.createElement('div');
    div.className='cond-item';
    div.innerHTML='<input type="checkbox" id="cond-'+idx+'" onchange="checkAllConditions()"><label for="cond-'+idx+'">'+c+'</label>';
    condList.appendChild(div);
  });
  condBox.classList.add('show');
  checkAllConditions();
}

function checkAllConditions(){
  var reward=document.getElementById('reward').value;
  var conds=CONDITIONS[reward]||[];
  var allChecked=true;
  for(var i=0;i<conds.length;i++){
    var cb=document.getElementById('cond-'+i);
    if(!cb||!cb.checked){allChecked=false;break;}
  }
  document.getElementById('submit-btn').disabled=!allChecked;
}

async function redeem(){
  var phone=document.getElementById('phone').value.trim();
  var reward=document.getElementById('reward').value;
  var staff=document.getElementById('staff').value;
  var result=document.getElementById('result');
  var btn=document.getElementById('submit-btn');

  result.className='result';
  result.style.display='none';

  if(!phone||phone.length<6){result.className='result err';result.textContent='Please enter a valid phone number';result.style.display='block';return;}
  if(!reward){result.className='result err';result.textContent='Please select a reward';result.style.display='block';return;}
  if(!staff){result.className='result err';result.textContent='Please select staff member';result.style.display='block';return;}

  btn.disabled=true;btn.textContent='Checking...';

  try{
    var url=SCRIPT_URL+'?action=redeem&phone='+encodeURIComponent(phone)+'&reward='+encodeURIComponent(reward)+'&staff='+encodeURIComponent(staff);
    var res=await fetch(url);
    var data=await res.json();

    if(data.success){
      result.className='result ok';
      result.textContent='\ud83c\udf89 Congrats! The reward is yours!';
      await loadInventory();
      onRewardChange();
      document.getElementById('phone').value='';
      document.getElementById('staff').value='';
    }else if(data.error==='already_redeemed'){
      result.className='result err';
      result.textContent='Sorry, this customer already redeemed this reward. Please try another reward.';
    }else if(data.error==='out_of_stock'){
      result.className='result err';
      result.textContent='This reward is sold out for today.';
      await loadInventory();
      onRewardChange();
    }else{
      result.className='result err';
      result.textContent='Something went wrong. Please try again.';
    }
  }catch(e){
    result.className='result err';
    result.textContent='Connection error. Please try again.';
  }

  result.style.display='block';
  btn.disabled=false;btn.textContent='Submit';
  checkAllConditions();
}

if(localStorage.getItem('staffAuth')==='1'){
  document.getElementById('gate').style.display='none';
  document.getElementById('main').classList.add('show');
  loadInventory();
}
</script>
</body>
</html>
